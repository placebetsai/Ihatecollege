services:
  # Main web app
  - type: web
    name: ihatecollege
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_TMDB_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false

  # Twitter cron — 3x/day at 8am, 1pm, 8pm ET (12, 17, 00 UTC)
  - type: cron
    name: ihatecollege-twitter-poster
    env: node
    region: oregon
    plan: free
    schedule: "0 12,17,0 * * *"
    buildCommand: npm install
    startCommand: node scripts/post-twitter.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
